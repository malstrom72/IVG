<html>
	<head>
		<script type="text/javascript" src="./ace/ace.js"></script>
		<script type="text/javascript" src="./setupModule.js"></script>
		<script type="text/javascript" src="./rasterizeIVG.js"></script>
		<title>ivgfiddle</title>
	</head>
	<style>
		.flex-row {
			display: flex;
			flex-direction: row;
		}
		.flex-col {
			display: flex;
			flex-direction: column;
		}
		.grow { flex-grow: 1; }
		#stage { height: 100%; }
		#traceDiv {
			height: 25%;
			min-height: 50px;
			max-height: 150px;
			overflow-y: scroll;
			background:black;
			color:lime;
			padding-left: 5px
		}
		#leftRightSplit {
			width: 3px;
			background: green;
			cursor: ew-resize;
		}
		#leftPanel {
			width: 50%;
			min-width: 250px;
		}
		#rightPanel {
			flex-grow: 1;
			overflow: auto;
			background-color: #444;
		    background-image:
		        linear-gradient(45deg, #888 25%, transparent 25%),
		        linear-gradient(-45deg, #888 25%, transparent 25%),
		        linear-gradient(45deg, transparent 75%, #888 75%),
		        linear-gradient(-45deg, transparent 75%, #888 75%);
		    background-size: 20px 20px;
		    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
		}
                #canvasToolbar {
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        padding: 8px 12px;
                        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
			background-color: rgba(0, 0, 0, 0.9);
                        color: #fff;
                }
                .toolbar-button {
                        display: inline-flex;
                        align-items: center;
                        justify-content: center;
                        min-width: 32px;
                        height: 28px;
                        padding: 0 10px;
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        border-radius: 3px;
                        background: rgba(255, 255, 255, 0.05);
                        color: inherit;
                        font: inherit;
                        cursor: pointer;
                        transition: background 120ms ease, border-color 120ms ease;
                }
                .toolbar-button[disabled] {
                        opacity: 0.4;
                        cursor: not-allowed;
                }
                .toolbar-button:not([disabled]):hover,
                .toolbar-button:not([disabled]):focus {
                        background: rgba(255, 255, 255, 0.15);
                        border-color: rgba(255, 255, 255, 0.35);
                        outline: none;
                }
                .toolbar-label {
                        font-size: 12px;
                        letter-spacing: 0.05em;
                        text-transform: uppercase;
                        opacity: 0.75;
                }
                #zoomLevelSelect {
                        min-width: 84px;
                        height: 28px;
                        border-radius: 3px;
                        border: 1px solid rgba(255, 255, 255, 0.2);
                        background: rgba(0, 0, 0, 0.5);
                        color: inherit;
                        font: inherit;
                        padding: 0 6px;
                }
                #zoomKeyboardHints {
                        font-size: 11px;
                        opacity: 0.55;
                }
		/*#ivgCanvas {
			border: 0.5px dashed rgba(255, 255, 255, 0.5);
		}*/
	</style>
	<body style="background:black">
		<div id="stage" class="flex-row">
			<div id="leftPanel" class="flex-col">
				<div id="editor" class="grow"></div>  
				<div id="traceDiv" class="grow">
					<pre id="trace"></pre>
				</div>
			</div>
			<div id="leftRightSplit"></div>
			<div id="rightPanel" class="flex-col">
                                <div id="canvasToolbar" class="flex-row" role="group" aria-label="IVG canvas tools">
                                        <label id="zoomLevelLabel" class="toolbar-label" for="zoomLevelSelect">Zoom</label>
                                        <button id="zoomOutButton" class="toolbar-button" type="button" aria-label="Zoom out">&minus;</button>
                                        <select id="zoomLevelSelect" aria-labelledby="zoomLevelLabel">
                                                <option value="25">25%</option>
                                                <option value="50">50%</option>
                                                <option value="75">75%</option>
                                                <option value="100" selected>100%</option>
                                                <option value="125">125%</option>
                                                <option value="150">150%</option>
                                                <option value="175">175%</option>
                                                <option value="200">200%</option>
                                                <option value="250">250%</option>
                                                <option value="300">300%</option>
                                                <option value="350">350%</option>
                                                <option value="400">400%</option>
                                        </select>
                                        <button id="zoomInButton" class="toolbar-button" type="button" aria-label="Zoom in">+</button>
                                        <button id="zoomResetButton" class="toolbar-button" type="button">Reset</button>
                                        <span id="zoomKeyboardHints" aria-hidden="true">Ctrl/Cmd + / &minus; / 0</span>
                                </div>
				<div id="screen">
					<canvas id="ivgCanvas">
						This text is displayed if your browser does not support HTML5 Canvas.
					</canvas>
				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript" src="./ivgfiddle.js"></script>
</html>
