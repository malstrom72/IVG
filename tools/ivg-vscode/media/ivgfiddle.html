<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>IVG Preview</title>
		<link rel="stylesheet" href="./ivgfiddle.css">
		<script type="text/javascript" src="./setupModule.js"></script>
		<script type="text/javascript" src="./rasterizeIVG.js"></script>
		<script type="text/javascript" src="./previewShared.js"></script>
	</head>
	<body>
		<div id="stage" class="flex-col">
			<div id="previewContainer" class="flex-col grow" role="region" aria-label="IVG Preview canvas">
				<div id="canvasToolbar" class="flex-row" role="group" aria-label="IVG Preview canvas tools">
					<label id="zoomLevelLabel" class="toolbar-label" for="zoomLevelSelect">Zoom</label>
					<button id="zoomOutButton" class="toolbar-button" type="button" aria-label="Zoom out">&minus;</button>
					<select id="zoomLevelSelect" aria-labelledby="zoomLevelLabel">
						<option value="25">25%</option>
						<option value="50">50%</option>
						<option value="75">75%</option>
						<option value="100" selected>100%</option>
						<option value="150">150%</option>
						<option value="200">200%</option>
						<option value="300">300%</option>
						<option value="400">400%</option>
						<option value="600">600%</option>
						<option value="800">800%</option>
						<option value="1000">1000%</option>
					</select>
					<button id="zoomInButton" class="toolbar-button" type="button" aria-label="Zoom in">+</button>
					<button id="vectorScalingToggle" class="toolbar-button" type="button" aria-pressed="false">Bitmap zoom</button>
					<button id="zoomResetButton" class="toolbar-button" type="button">Reset</button>
					<button id="backgroundButton" class="toolbar-button" type="button" aria-haspopup="dialog" aria-controls="backgroundDialog">Background</button>
					<span id="zoomKeyboardHints" aria-hidden="true">Ctrl/Cmd + / &minus; / 0</span>
				</div>
				<div id="backgroundOverlay" class="background-overlay is-hidden" aria-hidden="true">
					<div id="backgroundDialog" class="background-dialog" role="dialog" aria-modal="true" aria-labelledby="backgroundDialogTitle" aria-describedby="backgroundDialogDescription" tabindex="-1">
						<div class="background-dialog__header">
							<h2 id="backgroundDialogTitle">Canvas background</h2>
							<button id="backgroundCloseButton" type="button" aria-label="Close background picker">&times;</button>
						</div>
						<p id="backgroundDialogDescription">Select a background swatch to preview your artwork on common colors.</p>
						<div id="backgroundSwatchContainer" class="background-swatches" role="listbox" aria-labelledby="backgroundDialogTitle"></div>
					</div>
				</div>
				<div id="screen" class="grow">
					<canvas id="ivgCanvas" data-scaling-mode="bitmap">
						This text is displayed if your browser does not support HTML5 Canvas.
					</canvas>
				</div>
			</div>
			<div id="traceContainer" class="trace-container" role="region" aria-label="Rasterization trace output">
				<div class="trace-header">
					<button id="traceToggleButton" class="trace-toggle" type="button" aria-expanded="true" aria-controls="traceDiv">Hide trace</button>
				</div>
				<div id="traceDiv" class="trace-body" role="log" aria-live="polite">
					<pre id="trace"></pre>
				</div>
			</div>
		</div>
		<script type="text/javascript" src="./ivgfiddle.js"></script>
	</body>
</html>
