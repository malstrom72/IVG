<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>IVGFiddle Preview</title>
		<link rel="stylesheet" href="./ivgfiddle.css">
		<script type="text/javascript" src="./setupModule.js"></script>
		<script type="text/javascript" src="./rasterizeIVG.js"></script>
	</head>
	<body>
		<div id="stage" class="flex-col">
			<div id="screen" class="grow">
				<canvas id="ivgCanvas">

				</canvas>
			</div>
			<div id="status" role="status">Initializing renderer…</div>

			</div>
		</div>
		<script type="text/javascript" src="./ivgfiddle.js"></script>
	</body>
</html>
